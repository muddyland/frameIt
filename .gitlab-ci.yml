stages:
  - lint
  - test
  - build

# ── Shared Python setup ────────────────────────────────────────────────────

.python_base:
  image: python:3.12-slim
  tags:
    - saas-linux-small-amd64
  before_script:
    - pip install --quiet -r requirements.txt -r tests/requirements.txt psutil

# ── Lint ───────────────────────────────────────────────────────────────────

lint:
  extends: .python_base
  stage: lint
  script:
    - pip install --quiet pylint
    - echo "==> Linting main app..."
    - pylint main.py models.py --rcfile=.pylintrc
    - echo "==> Linting agent..."
    - pylint agent/agent.py --rcfile=.pylintrc
  allow_failure: false

# ── Test ───────────────────────────────────────────────────────────────────

test:
  extends: .python_base
  stage: test
  script:
    - echo "==> Running test suite..."
    - pytest tests/ agent/tests/
        --tb=short
        --cov=main
        --cov=models
        --cov=agent/agent
        --cov-report=term-missing
        --cov-report=xml:coverage.xml
        -q
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
    expire_in: 30 days

# ── Build ──────────────────────────────────────────────────────────────────

build:
  stage: build
  tags:
    - saas-linux-small-amd64
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker version
    - echo "Building Docker image..."
    - docker build --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
