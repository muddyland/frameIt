<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrameIT — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .form-label { color: #dee2e6; }
    </style>
</head>
<body class="bg-dark text-white">
    <div class="card bg-secondary bg-opacity-10 border-secondary" style="width:360px">
        <div class="card-body p-4">
            <h4 class="text-center fw-bold mb-1">FrameIT</h4>
            <p class="text-center text-secondary small mb-4">Admin</p>
            {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
            {% endif %}
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control bg-dark text-white border-secondary"
                           autofocus autocomplete="username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary"
                           autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
