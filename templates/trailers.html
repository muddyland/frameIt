{% extends "admin_main.html" %}
{% block title %}Trailers{% endblock %}

{% block content %}
<div class="row g-4">
    <!-- Add trailer card -->
    <div class="col-12">
        <div class="card bg-secondary bg-opacity-10 border-secondary">
            <div class="card-body">
                <h5 class="card-title mb-3"><i class="fa-solid fa-circle-plus me-2"></i>Add Trailer</h5>
                <form id="add-form" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">YouTube URL or Video ID</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="yt-url" placeholder="https://www.youtube.com/watch?v=... or video ID" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="yt-title" placeholder="Movie title" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100" id="add-btn"><i class="fa-solid fa-plus me-1"></i>Add</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Trailer list -->
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0"><i class="fa-solid fa-film me-2"></i>Library <span id="trailer-count" class="badge bg-secondary ms-2"></span></h5>
            <button class="btn btn-outline-light btn-sm" onclick="loadTrailers()"><i class="fa-solid fa-rotate me-1"></i>Refresh</button>
        </div>
        <div id="trailer-list"></div>
    </div>
</div>

<!-- Edit modal -->
<div class="modal fade" id="edit-modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title"><i class="fa-solid fa-pen me-2"></i>Edit Trailer</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="edit-title">
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="edit-active">
                    <label class="form-check-label" for="edit-active">Active (included in rotation)</label>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var editModal = new bootstrap.Modal(document.getElementById('edit-modal'));
var _trailers = {};

function _cacheBadge(t) {
    var s = t.cache_status;
    if (s === 'ready')       return '<span class="badge bg-primary ms-1"><i class="fa-solid fa-circle-check me-1"></i>Cached</span>';
    if (s === 'downloading') return '<span class="badge bg-warning text-dark ms-1"><i class="fa-solid fa-spinner fa-spin me-1"></i>Downloading</span>';
    if (s === 'pending')     return '<span class="badge bg-secondary ms-1">Pending</span>';
    if (s === 'error')       return '<span class="badge bg-danger ms-1">Cache Error</span>';
    return '';
}

function loadTrailers() {
    fetch('/api/trailers')
        .then(function(r) { return r.json(); })
        .then(function(trailers) {
            _trailers = {};
            trailers.forEach(function(t) { _trailers[t.id] = t; });
            document.getElementById('trailer-count').textContent = trailers.length;
            var list = document.getElementById('trailer-list');
            if (!trailers.length) {
                list.innerHTML = '<div class="text-secondary">No trailers yet. Add one above.</div>';
                return;
            }
            list.innerHTML = '<div class="list-group">' + trailers.map(function(t) {
                var activeBadge = t.active
                    ? '<span class="badge bg-success">Active</span>'
                    : '<span class="badge bg-secondary">Inactive</span>';
                var clearBtn = (t.cache_status === 'ready' || t.cache_status === 'error')
                    ? '<button class="btn btn-sm btn-outline-secondary" title="Re-cache" onclick="clearCache(' + t.id + ')"><i class="fa-solid fa-rotate-right"></i></button>'
                    : '';
                return '<div class="list-group-item bg-dark text-white border-secondary d-flex align-items-center gap-2">' +
                    '<img src="' + t.thumb_url + '" style="width:80px;height:60px;object-fit:cover;border-radius:4px" alt="">' +
                    '<div class="flex-fill">' +
                    '<div class="fw-semibold">' + t.title + _cacheBadge(t) + '</div>' +
                    '<a href="https://youtu.be/' + t.youtube_id + '" target="_blank" class="text-secondary small">' + t.youtube_id + '</a>' +
                    '</div>' +
                    activeBadge +
                    clearBtn +
                    '<button class="btn btn-sm btn-outline-light" onclick="openEdit(' + t.id + ')"><i class="fa-solid fa-pen"></i></button>' +
                    '<button class="btn btn-sm btn-outline-danger" onclick="deleteTrailer(' + t.id + ')"><i class="fa-solid fa-trash"></i></button>' +
                    '</div>';
            }).join('') + '</div>';
        })
        .catch(function() { showAlert('Failed to load trailers.', 'danger'); });
}

function openEdit(id) {
    var t = _trailers[id];
    if (!t) return;
    document.getElementById('edit-id').value = t.id;
    document.getElementById('edit-title').value = t.title;
    document.getElementById('edit-active').checked = t.active;
    editModal.show();
}

function clearCache(id) {
    fetch('/api/trailers/' + id + '/cache', { method: 'DELETE' })
        .then(function(r) { return r.json(); })
        .then(function() { loadTrailers(); showAlert('Cache cleared — re-downloading.'); })
        .catch(function() { showAlert('Failed to clear cache.', 'danger'); });
}

function saveEdit() {
    var id = document.getElementById('edit-id').value;
    fetch('/api/trailers/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            title: document.getElementById('edit-title').value,
            active: document.getElementById('edit-active').checked,
        })
    })
    .then(function(r) { return r.json(); })
    .then(function() { editModal.hide(); loadTrailers(); showAlert('Trailer updated.'); })
    .catch(function() { showAlert('Failed to save.', 'danger'); });
}

function deleteTrailer(id) {
    if (!confirm('Remove this trailer?')) return;
    fetch('/api/trailers/' + id, { method: 'DELETE' })
        .then(function() { loadTrailers(); showAlert('Trailer removed.'); })
        .catch(function() { showAlert('Failed to remove.', 'danger'); });
}

document.getElementById('add-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = document.getElementById('add-btn');
    btn.disabled = true; btn.textContent = 'Adding...';
    fetch('/api/trailers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: document.getElementById('yt-url').value, title: document.getElementById('yt-title').value })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.error) { showAlert(data.error, 'danger'); return; }
        showAlert('Trailer added.');
        document.getElementById('add-form').reset();
        loadTrailers();
    })
    .catch(function() { showAlert('Failed to add trailer.', 'danger'); })
    .finally(function() { btn.disabled = false; btn.textContent = 'Add'; });
});

loadTrailers();
</script>
{% endblock %}
