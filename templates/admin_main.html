<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="FrameIT">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/img/icon.svg">
    <title>FrameIT — {% block title %}Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <style>
        .nav-link.active { font-weight: 600; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot-online  { background: #28a745; }
        .dot-offline { background: #dc3545; }
        .dot-unknown { background: #6c757d; }

        /* ── Dark mode readability fixes ───────────────────────────── */

        /* Form labels are near-black by default in Bootstrap — force white */
        .form-label { color: #dee2e6; }

        /* Helper/hint text below inputs */
        .form-text  { color: #adb5bd !important; }

        /* All card titles and body text on admin pages */
        .card-title, .card-body, .card-body p { color: #dee2e6; }

        /* Select dropdowns inherit the dark background but need explicit text colour */
        select.form-select.bg-dark { color: #dee2e6; }
        select.form-select.bg-dark option { background: #212529; color: #dee2e6; }

        /* Table cells in dark tables */
        .table-dark td, .table-dark th { color: #dee2e6; }

        /* List group items with dark background */
        .list-group-item.bg-dark { color: #dee2e6; }

        /* Badge text inside dark cards */
        .card-body .small { color: #adb5bd; }
        .card-body .text-light { color: #f8f9fa !important; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary position-relative">
        <div class="container-fluid">
            <!-- Far left: Preview -->
            <a class="nav-link text-secondary px-3" href="/?bypass_install=1" target="_blank" title="Preview frame display">
                <i class="fa-solid fa-eye me-1"></i>Preview
            </a>

            <!-- Center: Brand (absolute so it doesn't affect flex layout) -->
            <a class="navbar-brand fw-bold position-absolute start-50 translate-middle-x mb-0 h5" href="/admin">
                <i class="fa-solid fa-photo-film me-2"></i>FrameIT
            </a>

            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link {% if request.path == '/admin' %}active{% endif %}" href="/admin"><i class="fa-solid fa-gauge me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link {% if '/admin/posters' in request.path %}active{% endif %}" href="/admin/posters"><i class="fa-solid fa-image me-1"></i>Posters</a></li>
                    <li class="nav-item"><a class="nav-link {% if '/admin/trailers' in request.path %}active{% endif %}" href="/admin/trailers"><i class="fa-solid fa-clapperboard me-1"></i>Trailers</a></li>
                    <li class="nav-item"><a class="nav-link {% if '/admin/frames' in request.path %}active{% endif %}" href="/admin/frames"><i class="fa-solid fa-tv me-1"></i>Frames</a></li>
                    <li class="nav-item"><a class="nav-link {% if '/admin/settings' in request.path %}active{% endif %}" href="/admin/settings"><i class="fa-solid fa-sliders me-1"></i>Settings</a></li>
                </ul>
                <ul class="navbar-nav ms-3">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-secondary" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-circle-user me-1"></i>{{ session.admin_user }}
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end bg-dark border-secondary">
                            <li>
                                <a class="dropdown-item text-white" href="#" data-bs-toggle="modal" data-bs-target="#password-modal">
                                    <i class="fa-solid fa-lock me-2"></i>Change Password
                                </a>
                            </li>
                            <li><hr class="dropdown-divider border-secondary"></li>
                            <li>
                                <a class="dropdown-item text-danger" href="/admin/logout">
                                    <i class="fa-solid fa-right-from-bracket me-2"></i>Sign Out
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4 px-4">
        <div id="alerts"></div>
        {% block content %}{% endblock %}
    </div>

    <!-- Change password modal -->
    <div class="modal fade" id="password-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Change Password</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="pw-current" autocomplete="current-password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="pw-new" autocomplete="new-password">
                    </div>
                    <div class="mb-0">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="pw-confirm" autocomplete="new-password">
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="changePassword()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    function showAlert(msg, type) {
        type = type || 'success';
        var el = document.getElementById('alerts');
        var id = 'alert-' + Date.now();
        el.insertAdjacentHTML('beforeend',
            '<div id="' + id + '" class="alert alert-' + type + ' alert-dismissible fade show" role="alert">' +
            msg + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>');
        setTimeout(function () { var a = document.getElementById(id); if (a) a.remove(); }, 4000);
    }
    </script>
    <script>
    function changePassword() {
        var current = document.getElementById('pw-current').value;
        var newPw   = document.getElementById('pw-new').value;
        var confirm = document.getElementById('pw-confirm').value;
        if (!current || !newPw) { showAlert('All fields are required.', 'danger'); return; }
        if (newPw !== confirm)  { showAlert('New passwords do not match.', 'danger'); return; }
        fetch('/admin/password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ current: current, new: newPw }),
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.error) { showAlert(d.error, 'danger'); return; }
            bootstrap.Modal.getInstance(document.getElementById('password-modal')).hide();
            document.getElementById('pw-current').value = '';
            document.getElementById('pw-new').value = '';
            document.getElementById('pw-confirm').value = '';
            showAlert('Password updated.');
        })
        .catch(function() { showAlert('Failed to update password.', 'danger'); });
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
